  input[type="text"] { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 12px 9px 32px; border-radius: 8px; outline: none; }

  .ai-btn:disabled { opacity: 0.5; }
  .tabs { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; background: var(--surface); }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; white-space: nowrap; }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .filters { display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; background: var(--surface); }

  .chip { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; white-space: nowrap; }

  .ai-result { margin: 10px 16px; padding: 12px; background: #0f1a00; border: 1px solid #2a3d00; border-radius: 10px; color: var(--accent); font-size: 12px; line-height: 1.7; display: none; }

  .ai-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; font-family: 'Unbounded', sans-serif; }
  .grid { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; }
  .card.expanded { border-color: var(--accent); }
  .card-name { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .card-role { color: var(--muted); font-size: 11px; line-height: 1.4; margin-bottom: 10px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { padding: 2px 8px; border-radius: 4px; background: var(--tag-bg); color: var(--muted); font-size: 10px; border: 1px solid var(--border); }
  .tag.tech { color: #7c6fff; border-color: #2d2a4a; background: #1a1828; }
  .tag.level { color: var(--accent); border-color: #2a3300; background: #151a00; }
  .card-details { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .card.expanded .card-details { display: block; }
  .detail-row { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid #1a1a22; }
  .detail-label { color: var(--muted); font-size: 11px; min-width: 70px; flex-shrink: 0; }
  .detail-value { color: var(--text); font-size: 12px; word-break: break-word; flex: 1; }
  .detail-value a { color: var(--accent2); text-decoration: none; }
  .notes-block { margin-top: 10px; padding: 10px; background: var(--tag-bg); border-radius: 8px; border-left: 3px solid var(--accent2); color: #c0c0d0; font-size: 12px; line-height: 1.6; }
  .stack-block { margin-top: 8px; padding: 8px 10px; background: #151522; border-radius: 8px; font-size: 11px; color: #a0a0c0; line-height: 1.6; }
  .stack-lbl { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .contacts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .cbtn { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 11px; text-decoration: none; display: inline-block; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .status-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.met { background: var(--accent); }
  .dot.ready { background: #00e5a0; }
  .dot.pending { background: #ffaa00; }
</style>

  const te=document.getElementById("tabs");
  CATS.forEach(c=>{const b=document.createElement("button");b.className="tab"+(c.id===cat?" active":"");b.textContent=c.label;b.onclick=()=>{cat=c.id;render();te.querySelectorAll(".tab").forEach((x,i)=>x.className="tab"+(CATS[i].id===cat?" active":""));};te.appendChild(b);});
  const fe=document.getElementById("filters");
  CHIPS.forEach(f=>{const b=document.createElement("button");b.className="chip";b.textContent=f;b.onclick=()=>{filters.has(f)?filters.delete(f):filters.add(f);b.className="chip"+(filters.has(f)?" on":"");render();};fe.appendChild(b);});
  document.getElementById("search").addEventListener("input",e=>{q=e.target.value;document.getElementById("ai-result").classList.remove("show");render();});
  render();
}

function filtered(){
  let l=PEOPLE;
  if(cat!=="all")l=l.filter(p=>p.cat===cat);
  if(filters.size>0)l=l.filter(p=>[...(p.tags||[]),p.level||""].some(t=>[...filters].every(f=>t.toLowerCase().includes(f.toLowerCase())||[...(p.tags||[])].some(t2=>t2.toLowerCase().includes(f.toLowerCase())))));
  if(q.trim()){const s=q.toLowerCase();l=l.filter(p=>[p.name,p.role,p.stack,p.notes,p.exp,(p.tags||[]).join(" ")].some(x=>x&&x.toLowerCase().includes(s)));}
  return l;
}

function render(){
  const list=filtered();
  const g=document.getElementById("grid");
  g.innerHTML="";
  if(!list.length){g.innerHTML='<div class="empty">🔍 Никого не нашлось</div>';return;}
  list.forEach(p=>{
    const card=document.createElement("div");card.className="card";
    const sc=p.status==="ready"?"ready":p.status==="pending"?"pending":p.met?"met":"";
    let tags=(p.level?`<span class="tag level">${p.level}</span>`:"")+((p.tags||[]).map(t=>`<span class="tag tech">${t}</span>`).join(""))+(p.statusLabel?`<span class="tag">${p.statusLabel}</span>`:"");
    let det="";
    [["Роль",p.role],["Опыт",p.exp],["Локация",p.location],["Зарплата",p.salary],["Формат",p.format],["Источник",p.source],["Компании",p.companies],["Образование",p.edu]].forEach(([l,v])=>{if(v)det+=`<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value">${v}</span></div>`;});
    let contacts="";
    if(p.tg)contacts+=`<a class="cbtn" href="${p.tg}" target="_blank">💬 ${p.tg_l||"TG"}</a>`;
    else if(p.tg_l)contacts+=`<span class="cbtn">💬 ${p.tg_l}</span>`;
    if(p.phone)contacts+=`<a class="cbtn" href="tel:${p.phone}">📞 ${p.phone}</a>`;
    if(p.email)contacts+=`<a class="cbtn" href="mailto:${p.email}">📧 Email</a>`;
    if(p.resume)contacts+=`<a class="cbtn" href="${p.resume}" target="_blank">📄 Резюме</a>`;
    if(p.record)contacts+=`<a class="cbtn" href="${p.record}" target="_blank">🎥 Запись</a>`;
    card.innerHTML=`
      <div class="status-row"><div class="dot ${sc}"></div><div class="card-name">${p.name}</div></div>
      <div class="card-role">${p.role}</div>
      <div class="card-tags">${tags}</div>
      <div class="card-details">
        ${det}
        ${p.stack?`<div class="stack-block"><div class="stack-lbl">Стек</div>${p.stack}</div>`:""}
        ${p.notes?`<div class="notes-block">${p.notes}</div>`:""}
        ${contacts?`<div class="contacts">${contacts}</div>`:""}
      </div>`;
    card.onclick=e=>{if(e.target.tagName==="A")return;card.classList.toggle("expanded");};
    g.appendChild(card);
  });
}

async function doAI(){
  const sq=document.getElementById("search").value.trim();
  if(!sq)return;
  const btn=document.getElementById("ai-btn");btn.disabled=true;btn.textContent="...";
  const ctx=PEOPLE.map(p=>`${p.name}: ${p.role}. Стек: ${p.stack||"—"}. ${p.notes||""}`).join("\n");
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Ты помощник команды AI-студии MAXimum. Запрос: "${sq}"\n\nСпециалисты:\n${ctx}\n\nКто лучше подходит и почему? До 5 предложений, по-русски.`}]})});
    const d=await r.json();
    document.getElementById("ai-text").textContent=d.content?.[0]?.text||"Нет ответа";
    document.getElementById("ai-result").classList.add("show");
  }catch(e){document.getElementById("ai-text").textContent="Ошибка запроса";document.getElementById("ai-result").classList.add("show");}
  btn.disabled=false;btn.textContent="✦ AI";
}

if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}
init();
</script>
